<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contact</title>
    <link rel="stylesheet" type="text/css" href="form.css">
</head>

<body>
    <header>
        <p><span>*</span> - Denotes Required Information</p>
        <nav>
            <ul>
                <a href="donation.html"> > Educations</a>
                <a href="confirmation.html"> > Experience</a>
                <a href="Thank You.html"> > Thank You!</a>
            </ul>
        </nav>
    </header>
    <h1>Donor Information</h1>

    <form method="post">
        <table class="center-form">
            <tr>
                <td><label for="first name">First Name<span class="required">*</span></label></td>
                <td><input type="text" id="first name" name="first name" required> </td>
            </tr>

            <tr>
                <td><label for="last name">Last Name<span class="required">*</span></label></td>
                <td><input type="text" id="last name" name="last name" required></td>
            </tr>

            <tr>
                <td><label for="company">Company</label></td>
                <td><input type="text" id="company" name="company"></td>
            </tr>

            <tr>
                <td><label for="address 1">Address 1<span class="required">*</span></label></td>
                <td><input type="text" id="address 1" name="address 1" required></td>
            </tr>

            <tr>
                <td><label for="address 2">Address 2</label></td>
                <td><input type="text" id="address 2" name="address2"></td>
            </tr>

            <tr>
                <td><label for="city">City<span class="required">*</span></label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>

            <tr>
                <td><label>State<span class="required">*</span></label></td>
                <td> <select name="state">
                        <option value="" disabled selected>Select a State</option>

                        <option>Dhaka</option>
                        <option>Kolkata</option>
                        <option>Miami</option>
                        <option>London</option>
                    </select required> </td>
            </tr>

            <tr>
                <td><label for="zipcode">Zip Code<span class="required">*</span></label></td>
                <td><input type="text" id="zipcode" name="zipcode" required></td>
            </tr>

            <tr>
                <td><label>Country<span class="required">*</span></label></td>
                <td> <select name="country">
                        <option value="" disabled selected>Select a Country</option>
                        <option>Bangladesh</option>
                        <option>India</option>
                        <option>USA</option>
                        <option>UK</option>
                    </select required> </td>
            </tr>

            <tr>
                <td><label for="mobile">Phone</label></td>
                <td><input type="text" id="mobile" name="mobile"></td>
            </tr>

            <tr>
                <td><label for="fax">Fax</label></td>
                <td><input type="text" id="fax" name="fax"></td>
            </tr>

            <tr>
                <td><label for="email">Email<span class="required">*</span></label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>

            <tr>
                <td><label>Donation Amount<span class="required">*</span>
                        <div class="note">(Check a button or type in your amount)</div>
                    </label></td>
                <td>
                    <input type="radio" name="donationamount" value="none"> None
                    <input type="radio" name="donationamount" value="$50"> $50
                    <input type="radio" name="donationamount" value="$75"> $75
                    <input type="radio" name="donationamount" value="$100"> $100
                    <input type="radio" name="donationamount" value="$250"> $250
                    <input type="radio" name="donationamount" value="other"> Other
                </td>
            </tr>

            <tr>
                <td></td>
                <td class="left-align">
                    <label for="other amount"><strong>Other Amount $</strong> </label>
                    <input type="text" id="other amount" name="other amount" style="width: 250px;">
                </td>
            </tr>

            <tr>
                <td>
                    <label>Recurring Donation
                        <div class="note">(Check if yes)</div>
                    </label>
                </td>
                <td class="left-align">
                    <input type="checkbox">
                    I am interested in giving on a regular basis.
                    <br>
                    <label for="monthly_credit_card">Monthly Credit Card $</label>
                    <input type="text" id="monthly_credit_card" name="monthly_credit_card">
                    <label for="months">For</label>
                    <input type="text" id="months" name="months">
                    <label>Months</label>
                </td>
            </tr>



        </table>

    </form>


</body>

</html>
